<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ログイン / 新規登録 - PC Builds Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="images/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#19e3ff" />
</head>
<body class="auth-page">
  <div class="page">
    <header class="top-header">
      <a href="./" class="site-logo">PC <span>Builds</span> Hub</a>
      <div class="nav-actions">
        <a href="./" class="btn">トップへ戻る</a>
        <!-- ログイン済みのときだけ login.js が表示する -->
        <a href="mypage.html" class="btn" id="toMypageLink" hidden>マイページへ</a>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-card" aria-labelledby="authTitle">
        <h1 id="authTitle" class="auth-title">ログイン</h1>
        <p class="auth-lead" id="authLead">
          メールアドレスとパスワードでログインしてください。
        </p>

        <!-- 設定未完了・案内メッセージ -->
        <div class="auth-message" id="authMessage" role="status" hidden></div>

        <form id="authForm" class="auth-form" autocomplete="on" novalidate>
          <div class="auth-field" id="displayNameField" hidden>
            <label for="displayName">表示名</label>
            <input id="displayName" name="displayName" type="text" autocomplete="nickname"
              placeholder="例：自作ユーザー" />
          </div>

          <div class="auth-field">
            <label for="email">メールアドレス</label>
            <input id="email" name="email" type="email" autocomplete="email"
              placeholder="you@example.com" required />
          </div>

          <div class="auth-field">
            <label for="password">パスワード</label>
            <input id="password" name="password" type="password" autocomplete="current-password"
              placeholder="6文字以上" required minlength="6" />
          </div>

          <div class="auth-actions-row">
            <button type="submit" class="btn btn-primary" id="primaryBtn">ログイン</button>
          </div>
        </form>

        <p class="auth-switch">
          <span id="switchPrompt">アカウントをお持ちでない場合：</span>
          <button type="button" class="auth-link-btn" id="switchModeBtn">新規登録はこちら</button>
        </p>

        <p class="auth-foot">
          <a href="./" class="auth-link">← トップへ戻る</a>
        </p>
      </section>
    </main>

    <footer class="page-footer">
      &copy; 2026 PC Builds Hub. All rights reserved.
    </footer>
  </div>

  <!-- Supabase（任意）: config はダミー値の間 Auth は無効。詳細は SETUP_SUPABASE.md -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="login.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
