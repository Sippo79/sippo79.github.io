<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="画像なし">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#0f1622"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19e3ff"/>
      <stop offset="1" stop-color="#7b61ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- simple PC tower glyph -->
  <g fill="none" stroke="url(#ac)" stroke-width="6" opacity="0.7">
    <rect x="330" y="150" width="140" height="200" rx="12"/>
    <line x1="360" y1="185" x2="440" y2="185"/>
    <line x1="360" y1="210" x2="440" y2="210"/>
    <circle cx="400" cy="300" r="22"/>
  </g>
  <text x="400" y="410" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="30" font-weight="700" fill="#7e8aa0">No Image</text>
  <text x="400" y="448" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="20" fill="#5a6678">画像が登録されていません</text>
</svg>
