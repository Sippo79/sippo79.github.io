<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="PC Builds Hub">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19e3ff"/>
      <stop offset="1" stop-color="#7b61ff"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background (maskable safe) -->
  <rect width="512" height="512" fill="#050709"/>
  <!-- accent glow within ~80% safe zone -->
  <rect x="96" y="96" width="320" height="320" rx="64" fill="url(#g)" opacity="0.14"/>
  <rect x="96" y="96" width="320" height="320" rx="64" fill="none" stroke="url(#g)" stroke-width="6" opacity="0.55"/>
  <!-- PC monogram -->
  <text x="256" y="262" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="150" font-weight="800" fill="url(#g)">PC</text>
  <text x="256" y="344" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="46" font-weight="700" letter-spacing="6" fill="#f5f5f5">BUILDS</text>
</svg>
