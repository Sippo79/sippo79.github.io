<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>投稿承認（管理者） - PC Builds Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="images/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#19e3ff" />
</head>
<body class="admin-page">
  <div class="page">
    <header class="top-header">
      <a href="index.html" class="site-logo">PC <span>Builds</span> Hub</a>
      <div class="nav-actions">
        <a href="index.html" class="btn">トップへ戻る</a>
        <!-- マイページ / ログアウトは auth.js が data-auth-ui に描画（重複を避けて一本化） -->
        <span class="auth-actions" data-auth-ui></span>
      </div>
    </header>

    <main class="admin-main">
      <section class="page-header">
        <div>
          <h1 class="page-title">投稿承認</h1>
          <p class="page-subtitle">
            承認待ち（pending）の投稿を確認し、公開（approved）または差し戻し（rejected）できます。
          </p>
        </div>
      </section>

      <!-- 状態メッセージ（未設定 / アクセス拒否 / 操作結果） -->
      <div class="auth-message" id="adminMessage" role="status" hidden></div>

      <section id="adminContent" hidden>
        <div class="admin-toolbar">
          <span class="admin-count" id="pendingCount"></span>
          <button type="button" class="btn" id="reloadBtn">再読み込み</button>
        </div>
        <div id="adminList" class="admin-list" aria-live="polite"></div>
      </section>
    </main>

    <footer class="page-footer">
      &copy; 2026 PC Builds Hub. All rights reserved.
    </footer>
  </div>

  <!-- Supabase（任意）: config はダミー値の間 管理機能は無効。詳細は SETUP_SUPABASE.md -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="admin.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
